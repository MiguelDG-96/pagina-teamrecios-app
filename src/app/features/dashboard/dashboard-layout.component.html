<div class="flex flex-col min-h-screen bg-[#09090b]">
  
  <!-- Top Navigation Bar going end-to-end -->
  <header class="navbar bg-[#18181B] border-b border-white/5 px-4 sm:px-6 flex justify-between select-none h-16 z-50">
    <!-- Left: Branding & Mobile drawer trigger -->
    <div class="flex items-center gap-3">
      <!-- Mobile drawer toggle -->
      <label for="dashboard-drawer" aria-label="open sidebar" class="lg:hidden btn btn-square btn-ghost btn-sm text-slate-300 hover:bg-white/5 mr-1 flex items-center justify-center">
        <lucide-icon name="menu" class="w-5 h-5"></lucide-icon>
      </label>
      
      <!-- Logo + Title -->
      <div class="flex items-center gap-3 select-none">
        <div class="w-8 h-8 rounded-lg bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center">
          <img src="/img/logo/logo.png" alt="Logo" class="w-5 h-5 object-contain" />
        </div>
        <div class="flex flex-col">
          <span class="text-2xl font-bold tracking-tight text-white leading-tight">
            Team <span class="text-indigo-400 font-light">Recios</span>
          </span>
        </div>
      </div>
    </div>
    
    <!-- Right: Search, Notifications, Avatar bubble -->
    <div class="flex items-center gap-4">
      
      <!-- Search Input -->
      <div class="relative hidden md:flex items-center">
        <lucide-icon name="search" class="w-4 h-4 text-gray-500 absolute left-2 pointer-events-none z-10"></lucide-icon>
        <input
          type="text"
          placeholder="Search"
          class="w-64 bg-white/5 border border-white/10 rounded-lg pl-10 pr-4 py-1.5 text-sm text-white placeholder-gray-500 outline-none focus:border-indigo-400/40 focus:ring-2 focus:ring-indigo-500/10 transition-all duration-300 select-none z-0"
        />
      </div>

      <!-- Notification bell with small badge -->
      <div class="relative flex items-center justify-center cursor-pointer select-none">
        <button class="btn btn-ghost btn-circle btn-sm text-gray-400 hover:text-indigo-400 hover:bg-white/5 transition-all duration-300 flex items-center justify-center">
          <lucide-icon name="bell" class="w-5 h-5"></lucide-icon>
        </button>
        <span class="absolute -top-0.5 -right-0.5 flex items-center justify-center text-[10px] font-extrabold bg-blue-500/20 text-blue-300 border border-blue-500/30 rounded-md w-4 h-4 text-center">
          5
        </span>
      </div>

      <!-- Initials bubble Avatar -->
      <div class="flex items-center gap-3">
        <!-- DU Avatar bubble style -->
        <div class="w-8 h-8 rounded-full bg-black border border-white/10 flex items-center justify-center text-white font-bold text-xs select-none shadow-sm cursor-pointer hover:bg-white/5 transition-all duration-300">
          {{ getUserInitials() }}
        </div>
      </div>

    </div>
  </header>

  <!-- Content & Sidebar Wrapper -->
  <div class="drawer lg:drawer-open flex-1 h-[calc(100vh-64px)] overflow-hidden">
    <input id="dashboard-drawer" type="checkbox" class="drawer-toggle" />
    
    <!-- Dynamic Routed Body View on the right -->
    <div class="drawer-content flex flex-col flex-1 h-full overflow-y-auto bg-[#09090b]/60 p-6 md:p-8">
      <router-outlet />
    </div>

    <!-- Sidebar menu on the left -->
    <div class="drawer-side h-full z-40 select-none border-r border-white/5 bg-[#0c0c0d]">
      <label for="dashboard-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
      <aside class="w-72 bg-[#09090b] h-full flex flex-col justify-between">
        
        <!-- Navigation Menu Items -->
        <div class="flex flex-col flex-1 overflow-y-auto">
          <div class="px-3 py-4 flex flex-col gap-1">
            <a
              routerLink="/admin/dashboard"
              routerLinkActive="bg-white/5 text-blue-400 border border-transparent font-semibold"
              [routerLinkActiveOptions]="{ exact: true }"
              class="flex items-center justify-between gap-3 text-gray-300 hover:bg-white/5 hover:text-white font-medium rounded-lg px-4 py-2.5 transition-all duration-200 select-none cursor-pointer"
            >
              <div class="flex items-center gap-3">
                <lucide-icon name="layout-grid" class="w-5 h-5 text-current"></lucide-icon>
                <span class="text-sm">Welcome</span>
              </div>
            </a>
          </div>

          <!-- Modules Section -->
          <div class="flex flex-col gap-2 mt-2">
            <div class="flex items-center justify-between px-6 select-none">
              <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Shop</span>
              <lucide-icon name="arrow-right" class="w-3.5 h-3.5 text-gray-500 rotate-90 opacity-60"></lucide-icon>
            </div>

            <ul class="px-3 flex flex-col gap-1">
              @for (mod of modulos; track mod.id) {
                <li class="transition-all duration-300">
                  <a
                    [routerLink]="mod.ruta"
                    routerLinkActive="bg-white/5 text-blue-400 border border-transparent font-semibold"
                    class="flex items-center justify-between gap-3 text-gray-300 hover:bg-white/5 hover:text-white font-medium rounded-lg px-4 py-2.5 transition-all duration-200 select-none cursor-pointer"
                  >
                    <div class="flex items-center gap-3">
                      <lucide-icon [name]="getLucideName(mod.slug)" class="w-5 h-5 text-current"></lucide-icon>
                      <span class="text-sm">{{ mod.nombre }}</span>
                    </div>
                  </a>
                </li>
              }
            </ul>
          </div>
        </div>

        <!-- User Logout Block in Sidebar -->
        <div class="p-4 border-t border-white/5 flex flex-col gap-2 select-none">
          <button (click)="onLogout()" class="w-full flex items-center justify-center gap-2 bg-white/5 hover:bg-rose-500/10 hover:text-rose-400 text-gray-400 font-bold tracking-wider py-2.5 px-4 rounded-lg border border-transparent hover:border-rose-500/20 transition-all duration-200 text-xs cursor-pointer">
            <lucide-icon name="arrow-right" class="w-4 h-4"></lucide-icon>
            <span>Cerrar Sesión</span>
          </button>
        </div>

      </aside>
    </div>

  </div>

</div>
