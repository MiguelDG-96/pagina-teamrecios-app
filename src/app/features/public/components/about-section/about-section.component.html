<section
  id="about"
  class="relative bg-[#000004] py-16 sm:py-24 overflow-hidden"
>
  <!-- Background Glows -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-1/4 right-1/4 w-[500px] h-[500px] bg-indigo-600/5 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-1/4 left-1/4 w-[400px] h-[400px] bg-violet-700/5 rounded-full blur-[100px]"></div>
  </div>

  <div class="relative max-w-7xl mx-auto px-6 lg:px-12">
    
    <!-- Section Header -->
    <div class="flex flex-col items-center text-center gap-4 mb-16 sm:mb-20">
      <span class="text-xs font-bold tracking-[0.3em] uppercase text-indigo-400">
        SOBRE NOSOTROS
      </span>
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-white tracking-tight">
        Conoce a los Fundadores
      </h2>
      <div class="w-20 h-1.5 bg-indigo-600/40 rounded-full mt-2 overflow-hidden">
        <div class="w-1/2 h-full bg-indigo-400 animate-pulse"></div>
      </div>
    </div>

    <!-- Founders Grid -->
    <div class="grid grid-cols-1 gap-12 md:gap-16 max-w-5xl mx-auto">
      @for (founder of founders; track founder.name) {
        <div class="group relative flex flex-col md:flex-row items-center md:items-start gap-8 md:gap-12 p-6 md:p-10
                    bg-[#040612] border border-indigo-500/15 rounded-2xl
                    hover:border-indigo-500/40 transition-all duration-500 hover:-translate-y-1
                    shadow-xl shadow-black/60 overflow-hidden">
          
          <!-- Image Wrapper with the Purple mask glow effect -->
          <div class="flex-shrink-0 relative w-[180px] h-[180px] sm:w-[220px] sm:h-[220px] md:w-[240px] md:h-[240px] flex items-center justify-center">
            
            <!-- Purple background circle/mask shifted downwards -->
            <div class="absolute inset-0 w-[145px] h-[145px] sm:w-[185px] sm:h-[185px] md:w-[195px] md:h-[195px] m-auto bg-gradient-to-b from-indigo-500/50 via-purple-600/40 to-transparent rounded-full blur-md opacity-90 translate-y-7 group-hover:translate-y-6 transition-all duration-500 pointer-events-none z-0"></div>
            
            <!-- Foreground Image frame -->
            <div class="relative w-[155px] h-[155px] sm:w-[195px] sm:h-[195px] md:w-[205px] md:h-[205px] rounded-full overflow-hidden border border-indigo-500/20 bg-transparent z-10 group-hover:border-indigo-400/40 transition-all duration-300">
              <img
                [src]="founder.image"
                [alt]="founder.name"
                class="w-full h-full object-cover object-top scale-[1.02] group-hover:scale-105 transition-all duration-500"
              />
            </div>
          </div>

          <!-- Content side -->
          <div class="flex flex-col flex-1 justify-center text-center md:text-left">
            <span class="text-sm font-semibold tracking-wider text-indigo-400 md:text-indigo-300 mb-2 block">
              {{ founder.role }}
            </span>
            <h3 class="text-3xl sm:text-4xl font-extrabold text-white tracking-tight mb-2 group-hover:text-indigo-300 transition-colors duration-300">
              {{ founder.name }}
            </h3>
            <span class="text-xs font-medium text-gray-400 mb-5 block leading-relaxed">
              {{ founder.education }}
            </span>
            <p class="text-gray-300 text-sm leading-relaxed mb-6 max-w-2xl">
              {{ founder.description }}
            </p>

            <!-- Tech Stack Toggle Button -->
            <div class="flex justify-center md:justify-start mb-4">
              <button
                (click)="toggleSkills(founder.name)"
                class="inline-flex items-center gap-2 px-6 py-2.5 rounded-xl
                       bg-indigo-600/10 border border-indigo-500/20 text-indigo-300 font-semibold text-sm
                       hover:bg-indigo-600/20 hover:border-indigo-500/40 hover:-translate-y-0.5
                       transition-all duration-300 group/btn"
              >
                <span>{{ visibleSkills()[founder.name] ? 'Ocultar Tech Stack' : 'Ver Tech Stack' }}</span>
                <lucide-icon
                  [name]="visibleSkills()[founder.name] ? 'chevron-up' : 'chevron-down'"
                  class="w-4 h-4 transition-transform duration-300"
                  [class.rotate-180]="visibleSkills()[founder.name]"
                ></lucide-icon>
              </button>
            </div>

            <!-- Tech Icons (Animated) -->
            <div class="overflow-hidden transition-[max-height,opacity] duration-700 ease-in-out"
                 [style.max-height]="visibleSkills()[founder.name] ? '500px' : '0px'"
                 [style.opacity]="visibleSkills()[founder.name] ? '1' : '0'"
                 [class.mt-4]="visibleSkills()[founder.name]">
              
              <div class="flex flex-wrap justify-center md:justify-start items-center gap-3 py-2">
                @for (tech of founder.techStack; track tech.name; let i = $index) {
                  <div
                    class="flex items-center gap-2 bg-indigo-500/5 border border-indigo-500/15 px-3.5 py-2 rounded-lg
                           shadow-sm transition-all duration-500 transform will-change-transform"
                    [style.transition-delay]="(visibleSkills()[founder.name] ? i * 80 : 0) + 'ms'"
                    [style.transition-timing-function]="'cubic-bezier(0.34, 1.56, 0.64, 1)'"
                    [class.translate-y-4]="!visibleSkills()[founder.name]"
                    [class.translate-y-0]="visibleSkills()[founder.name]"
                    [class.opacity-0]="!visibleSkills()[founder.name]"
                    [class.opacity-100]="visibleSkills()[founder.name]"
                    [title]="tech.name"
                  >
                    <img [src]="tech.iconUrl" [alt]="tech.name" class="w-5 h-5 object-contain" />
                    <span class="text-xs font-medium text-gray-300">{{ tech.name }}</span>
                  </div>
                }
              </div>
            </div>
          </div>

        </div>
      }
    </div>

  </div>
</section>
