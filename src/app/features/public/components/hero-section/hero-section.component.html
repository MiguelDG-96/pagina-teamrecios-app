<section
  id="hero"
  class="relative min-h-screen flex items-center overflow-hidden bg-[#000004] pt-16"
>

  <!-- ── Hero image — full right bleed ────────────────────────── -->
  <div class="absolute inset-0 pointer-events-none">
    <img
      src="/img/hero/hero.webp"
      alt="Soluciones digitales Team Recios"
      class="absolute right-0 top-0 h-full w-auto object-contain object-right opacity-60 sm:opacity-100"
      loading="eager"
    />

    <!-- Left fade gradient so text stays readable -->
    <div class="absolute inset-0
                bg-gradient-to-r
                from-[#000004] from-20% via-[#000004]/80 via-60%
                to-transparent sm:from-30% sm:via-[#000004]/75 sm:via-55%"></div>

    <!-- Bottom fade -->
    <div class="absolute bottom-0 left-0 right-0 h-32
                bg-gradient-to-t from-[#000004] to-transparent"></div>

    <!-- Top subtle vignette -->
    <div class="absolute top-0 left-0 right-0 h-24
                bg-gradient-to-b from-[#000004]/60 to-transparent"></div>

    <!-- Indigo glow accents -->
    <div class="absolute top-1/3 right-1/3 w-[300px] sm:w-[500px] h-[300px] sm:h-[500px]
                bg-indigo-600/10 rounded-full blur-[80px] sm:blur-[120px]"></div>
  </div>

  <!-- ── Text content — left column ───────────────────────────── -->
  <div class="relative z-10 w-full max-w-7xl
              px-6 sm:px-8 lg:pl-12 xl:pl-16
              py-20 sm:py-24 flex flex-col gap-6 sm:gap-8
              lg:w-[52%]">

    <!-- Badge -->
    <span class="inline-flex items-center gap-2 w-fit
                 text-[10px] sm:text-xs font-bold tracking-[0.2em] uppercase
                 text-indigo-400 border border-indigo-500/30
                 bg-indigo-500/10 rounded-full px-3 py-1 sm:px-4 sm:py-1.5">
      <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse"></span>
      TEAM RECIOS
    </span>

    <!-- Headline -->
    <h1 class="text-3xl sm:text-5xl xl:text-6xl font-extrabold
               leading-[1.2] sm:leading-[1.1] tracking-tight text-white">
      Soluciones digitales
      <br class="hidden sm:block">
      a la medida de
      <br>
      <span class="text-indigo-400">
        tu éxito
      </span>
    </h1>

    <!-- Subtitle -->
    <p class="text-sm sm:text-lg text-gray-400 max-w-md leading-relaxed">
      Desarrollamos software a la medida y automatizamos
      tus publicaciones en redes sociales para que puedas
      enfocarte en lo que realmente importa:
      <span class="text-gray-200 font-medium">hacer crecer tu negocio.</span>
    </p>

    <!-- CTA buttons -->
    <div class="flex flex-col sm:flex-row gap-4">
        <button
          id="hero-cta-services"
          class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-7 py-3.5 rounded-xl
                 bg-indigo-600 text-white font-semibold text-sm
                 hover:bg-indigo-500 hover:-translate-y-0.5
                 hover:shadow-lg hover:shadow-indigo-600/40
                 active:translate-y-0 transition-all duration-200"
          (click)="scrollToSection('services')"
        >
          Nuestros Servicios
          <lucide-icon name="arrow-right" class="w-4 h-4"></lucide-icon>
        </button>

        <button
          id="hero-cta-contact"
          class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-7 py-3.5 rounded-xl
                 border border-indigo-500/50 text-indigo-300 font-semibold text-sm
                 hover:border-indigo-400 hover:text-indigo-200 hover:bg-indigo-500/10
                 hover:-translate-y-0.5 active:translate-y-0
                 transition-all duration-200"
          (click)="scrollToSection('contact')"
        >
          Hablemos
          <lucide-icon name="send" class="w-3.5 h-3.5"></lucide-icon>
        </button>
    </div>

    <!-- Stats row -->
    <div class="grid grid-cols-2 sm:flex sm:flex-wrap gap-y-6 gap-x-8 pt-6">
      @for (stat of stats; track stat.label) {
        <div class="flex items-center gap-2.5">
          <lucide-icon [name]="stat.icon" class="w-5 h-5 text-indigo-400"></lucide-icon>
          <span class="text-[10px] sm:text-xs text-gray-400 font-medium leading-tight">
            {{ stat.label }}
          </span>
        </div>
      }
    </div>

  </div>


</section>
